<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			* {
				font-family: Arial, Helvetica, sans-serif;
				color: var(--text-color);
			}

			:root {
				--background-color: #222;
				--background-blue: rgb(24, 68, 129);
				--background-dark-blue: rgb(15, 31, 51);
				--background-light: #444;
				--background-highlight: #666;
				--accent-blue: #2079ff;
				--border-color: #aaa;
				--border-blue: #64a2ff;
				--border-green: rgb(79, 206, 107);
				--text-color: #fff;
			}

			body,
			html {
				margin: 0;
				padding: 0;
				height: 100%;
				width: 100%;
				background-color: var(--background-color);
			}

			i {
				color: inherit;
			}

			.leaflet-control-zoom-in *,
			.leaflet-control-zoom-out * {
				color: black !important;
			}

			.defaultBtn {
				box-sizing: border-box;
				background-image: linear-gradient(#52a6ff, #005fc5);
				background-size: 200% 200%;
				background-position-y: bottom;
				padding: 0.7rem 1.4rem 0.6rem 1.4rem;
				color: white;
				font-weight: bold;
				border: none;
				border-radius: 5px;
				box-shadow: 0px 3px 0px #00448d;
				transition: all 0.2s ease-out;
				text-shadow: 0 1px 3px #000000;
				cursor: pointer;
				display: inline-block;
				font-size: 1rem;
			}
			.defaultBtn:hover {
				background-position: center;
				box-shadow: 0px 3px 0px #0055af;
			}
			.defaultBtn:active {
				transform: translateY(3px);
				background-position: center;
				background-image: linear-gradient(#007bff, #3999ff);
				background-size: initial;
				box-shadow: 0px 0px 0px #0055af;
				text-shadow: 0 0px 2px #000000;
			}

			.defaultBtn.red {
				background-image: linear-gradient(#ff5b5b, #b91e1e);
				box-shadow: 0px 3px 0px #770a0a;
			}
			.defaultBtn.red:hover {
				box-shadow: 0px 3px 0px #8b1313;
			}
			.defaultBtn.red:active {
				box-shadow: 0px 0px 0px #8b1313;
				background-image: linear-gradient(#ce3636, #ff4444);
			}

			.defaultBtn.small {
				padding: 4px 7px 3px 7px;
				text-shadow: 0 1px 2px #000000;
				font-size: 0.8rem;
				font-weight: normal;
			}

			.defaultBtn.medium {
				padding: 6px 10px 5px 10px;
				text-shadow: 0 1px 2px #000000;
				font-weight: normal;
			}
		</style>
		<link rel="stylesheet" href="/src/assets/fontawesome/css/all.min.css" />
		<title>Kolibri Configurator</title>
	</head>

	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
